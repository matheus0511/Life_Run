<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>LifeRun | Cadastro</title><link rel="stylesheet" href="../styles/style.css" /></head>
<body><div class="app-shell auth-shell"><main class="auth-layout"><section class="auth-copy"><a class="brand" href="../index.html"><span class="brand-mark">LR</span><span><strong>LifeRun</strong><small>Eventos esportivos</small></span></a><h1>Crie sua conta de atleta</h1><p>Use o cadastro para salvar dados, fazer inscricoes e acompanhar resultados.</p></section><form class="auth-card"><label>Nome<input type="text" required placeholder="Seu nome completo" /></label><label>CPF<input type="text" required placeholder="000.000.000-00" /></label><label>Data de nascimento<input type="date" required /></label><label>Sexo<select required><option value="">Selecione</option><option>Feminino</option><option>Masculino</option><option>Outro</option><option>Prefiro nao informar</option></select></label><label>Email<input type="email" required placeholder="voce@email.com" /></label><label>Telefone<input type="tel" required placeholder="(00) 00000-0000" /></label><label>Senha<input type="password" required placeholder="Minimo 8 caracteres" /></label><button class="button button-primary" type="submit">Cadastrar</button><p class="form-note">Ja tem conta? <a href="login.html">Entrar</a></p></form></main></div><script src="../scripts/main.js"></script></body></html>
